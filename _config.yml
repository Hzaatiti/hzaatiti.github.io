              - college_logo: centralesupelec.png
                college_name: CentraleSupélec
                college_url: https://www.centralesupelec.fr
                college_degree: Master of Engineering
                description: System Architecture & Embedded Systems. (2014 to 2015)
                visibility: true
              - college_logo: lebanese-university.png
                college_name: Lebanese University, Faculty of Engineering
                college_url: https://ul.edu.lb
                college_degree: Engineering Diploma
                description: Electrical Engineering & Industrial Computing. (2010 to 2015)
                visibility: true

# Projects
author_project_details:
              - project_thumbnail: nyuad.png
                project_title: NeuroWaves
                project_description: Documentation and analysis pipelines for the MEG/EEG lab at NYU Abu Dhabi, covering data acquisition, preprocessing and reproducible workflows for magnetoencephalography.
                project_url: https://neurowaves.readthedocs.io/
                visibility: true
              - project_thumbnail: extra-inria-geomstats.png
                project_title: Geomstats
                project_description: Open-source Python package for computations and statistics on manifolds with geometric structures. Contributor to the core library and learning methods.
                project_url: https://geomstats.ai
                visibility: true

