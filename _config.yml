              - college_logo: paris-saclay.png
                college_name: Université Paris-Saclay & CEA
                college_url: https://www.universite-paris-saclay.fr
                college_degree: Ph.D., Computer Science
                description: "Thesis: Modeling and Qualitative Simulation of Hybrid Systems. (2015 to 2018)"
