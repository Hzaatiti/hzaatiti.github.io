# Edit Author details (For multi authors check _data/authors.yml)

author_logo: hadi.jpg
author: Hadi Zaatiti
author_bio: Doctor of engineering with 10 years of combined industry and academic experience, specialised in the modelling and simulation of dynamical systems across the automotive, military aerospace and healthcare industries. Currently a Research Scientist at the MEG/EEG labs of NYU Abu Dhabi's BioMedical Imaging Core, building neuroimaging pipelines and experimental paradigms.
author_email: "hadizaatiti@gmail.com"
author_location: Abu Dhabi, UAE
author_website_url: "https://zaatiti.fr"
scholar_url: "https://bit.ly/Hadi-Zaatiti-google-scholar"
cv_pdf_url: "/cv/CV_Hadi_Zaatiti.pdf"
typewrite-text: I model and simulate dynamical systems, from autonomous vehicles to the human brain.
hero_cover_img: sample_cover.jpg # hero background is themed via CSS; image kept as fallback

# Experiences
author_work_experiences:
            - company_name: New York University, Abu Dhabi
              company_logo: nyuad.png
              company_url: https://nyuad.nyu.edu
              designation: Research Scientist
              description: MEG/EEG labs of the BioMedical Imaging Core. Design experimental paradigms, maintain MEG/EEG/OPM systems and engineer neuroimaging data pipelines. (2024 to present)
              visibility: true
            - company_name: Airbus Defence & Space
              company_logo: airbus.png
              company_url: https://www.airbus.com
              designation: System Designer, MBSE & Simulation Specialist
              description: Model manager for the FCAS (Future Combat Air System) and EuroDrone programs, and MBSE & simulation tutor at Airbus Academy. (2022 to 2024)
              visibility: true
            - company_name: IRT SystemX
              company_logo: systemx.png
              company_url: https://www.irt-systemx.fr
              designation: System Architect for Autonomous Vehicles & Data Scientist
              description: Architected autonomous transportation systems with RATP, SNCF, Renault and others; representation learning on manifolds with Stanford and Inria. (2018 to 2022)
              visibility: true
            - company_name: CentraleSupélec
              company_logo: centralesupelec.png
              company_url: https://www.centralesupelec.fr
              designation: System Modelling & Simulation Teacher
              description: Taught system modelling, requirements engineering and simulation to 4th-year engineering students through an end-to-end case study. (2018 to 2022)
              visibility: true
            - company_name: CEA (French Alternative Energies and Atomic Energy Commission)
              company_logo: cea.png
              company_url: https://www.cea.fr
              designation: Research Engineer
              description: Modelling, simulation and formal verification of hybrid dynamical systems using SMT/SAT solvers; C++ verification toolchain. (2015 to 2018)
              visibility: true

