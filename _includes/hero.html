<style>
/* change cover_img in config.yml */
.jumbotron {
    background-color: var(--main-background-color) !important;
    background-image: url('/assets/img/{{site.hero_cover_img}}');
    text-align: center;
    background-attachment: fixed;
    background-size: cover;
    background-position: center;
}
.jumbotron-btns {
  display: block;
  margin-top: 50px;
}

.jumbotron-heading, .lead {
  color: #fff;
}
</style>

<!-- home hero section -->
<div class="jumbotron">
  <img class="author-profile-img" src="{{site.url}}{{site.baseurl}}/assets/img/{{site.author_logo}}" />
  <p class="jumbotron-heading">Hi, I am {{site.author}} !</p>

  <p class="lead" id="typewriteText"></p>
  <div class="jumbotron-btns">
    <a href="{{site.url}}{{site.baseurl}}/cv/">
      <button class="btn btn-md btn-warning"> <strong>View CV</strong> </button>
    </a>
    <a href="{{site.url}}{{site.baseurl}}/about">
      <button class="btn btn-md btn-default"> <strong>About me</strong> </button>
    </a>
    {% if site.github_username %}
    <a href="https://github.com/{{site.github_username}}">
      <button class="btn btn-md btn-default"> <strong>GitHub</strong> </button>
    </a>
    {% endif %}
  </div>
</div>
